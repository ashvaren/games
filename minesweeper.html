<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Minefield — Ashvaren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="ashvaren.js"></script>
  <style>
    :root{--bg:#080c14;--surface:#0e1420;--surface2:#111926;--border:#1a2535;--accent:#2e6fc4;--text:#d8e2f0;--text-dim:#6a7a90;--muted:#3a4a5a;--flag:#e05c3a}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg)}
    body{font-family:'DM Mono','Courier New',monospace;color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}
    button{-webkit-appearance:none;cursor:pointer;font-family:'DM Mono',monospace}
    .overlay{position:fixed;inset:0;background:rgba(8,12,20,0.96);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;overflow-y:auto}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:30px 26px;max-width:400px;width:100%;text-align:center}
    .wm{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:12px;letter-spacing:0.22em;color:var(--text-dim);margin-bottom:4px}
    .gtitle{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:34px;letter-spacing:0.03em;margin-bottom:4px;color:var(--accent)}
    .gsub{font-size:9px;letter-spacing:0.18em;color:var(--muted);margin-bottom:24px;text-transform:uppercase}
    .sec{margin-bottom:16px;text-align:left}
    .sec-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:7px}
    .seg-row{display:flex;gap:6px}
    .seg{flex:1;padding:9px 4px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:border-color .15s,background .15s}
    .seg:hover{border-color:var(--accent)}
    .seg.on{border-color:var(--accent);background:rgba(46,111,196,.15)}
    .seg-main{font-weight:700;letter-spacing:.05em}
    .seg-sub{font-size:8px;color:var(--muted)}
    .name-row{display:flex;align-items:center;gap:9px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:7px 11px;margin-bottom:7px}
    .ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .nin{background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;flex:1;letter-spacing:.04em;cursor:pointer}
    .btn{padding:8px 18px;border-radius:6px;border:none;font-size:11px;font-weight:700;letter-spacing:.07em;transition:opacity .15s;cursor:pointer}
    .btn:hover{opacity:.82}
    .btn-p{background:var(--accent);color:#fff}
    .btn-g{background:transparent;border:1.5px solid var(--border);color:var(--text-dim)}
    .btn-lg{width:100%;padding:12px;font-size:12px;border-radius:9px;margin-top:4px}
    .custom-fields{margin-top:10px;display:flex;gap:8px}
    .custom-field{flex:1}
    .custom-field label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:4px}
    .custom-field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none}
    .custom-field input:focus{border-color:var(--accent)}
    #app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 16px 40px;gap:10px}
    .hud{display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;width:100%;max-width:480px}
    .hud-cell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;border-right:1px solid var(--border)}
    .hud-cell:last-child{border-right:none}
    .hud-lbl{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:2px}
    .hud-val{font-size:18px;font-weight:500;line-height:1}
    .face-btn{font-size:18px;background:none;border:none;padding:8px 14px;border-right:1px solid var(--border);transition:background .12s;cursor:pointer}
    .face-btn:hover{background:var(--surface2)}
    .diff-tabs{display:flex;gap:5px;width:100%;max-width:480px;flex-wrap:wrap}
    .diff-tab{flex:1;min-width:60px;padding:6px 4px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--text-dim);font-size:9px;font-weight:600;letter-spacing:.06em;text-align:center;transition:border-color .15s,background .15s,color .15s;cursor:pointer}
    .diff-tab.on{border-color:var(--accent);background:rgba(46,111,196,.12);color:var(--text)}
    #board{display:inline-grid;border:1px solid var(--border);border-radius:6px;overflow:hidden;gap:0;background:var(--border)}
    .cell{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--surface2);border:none;cursor:pointer;transition:background .07s,transform .05s;position:relative}
    .cell::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 50%);pointer-events:none}
    .cell:hover:not(.rev):not(.exp){background:#1a2840;transform:scale(0.95)}
    .cell.rev{background:#0a1018;cursor:default;box-shadow:inset 1px 1px 2px rgba(0,0,0,.5)}
    .cell.rev::before{display:none}
    .cell.flag{color:var(--flag)}
    .cell.flag::after{content:'⚑';font-size:13px}
    .cell.exp{background:#2a0808;animation:explode .4s ease-out}
    .cell.mine-r{background:#1a0808;cursor:default}
    .cell.n1{color:#4a9eff}.cell.n2{color:#50c878}.cell.n3{color:#ff6b6b}.cell.n4{color:#9b59b6}.cell.n5{color:#e74c3c}.cell.n6{color:#1abc9c}.cell.n7{color:#e8edf5}.cell.n8{color:#6a7a90}
    @keyframes explode{0%{background:#ff4444;transform:scale(1.12)}40%{background:#aa2222}100%{background:#2a0808;transform:scale(1)}}
    @media(max-width:420px){.cell{width:24px;height:24px;font-size:10px}}
    .footer{display:flex;gap:8px}
    .back-link{font-size:10px;color:var(--text-dim);letter-spacing:.06em;cursor:pointer;background:none;border:none}
    .back-link:hover{color:var(--text)}
    .player-sel{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 14px;width:100%;max-width:480px;display:flex;align-items:center;gap:10px}
    .player-sel select{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;flex:1;cursor:pointer}
  </style>
</head>
<body>

<!-- SETUP -->
<div class="overlay" id="setup-overlay">
  <div class="card">
    <button class="back-link" onclick="window.location.href='index.html'" style="display:block;text-align:left;margin-bottom:10px">← Hub</button>
    <div class="wm">Ashvaren</div>
    <div class="gtitle">Minefield</div>
    <div class="gsub">Logic · Deduction · Nerve</div>
    <div class="sec"><div class="sec-lbl">Player</div>
      <div class="name-row"><div class="ndot" style="background:var(--accent)"></div>
        <select class="nin" id="psel"></select>
      </div>
    </div>
    <div class="sec"><div class="sec-lbl">Difficulty</div>
      <div class="seg-row" id="diff-segs">
        <button class="seg" data-diff="easy" onclick="setDiff(this)"><span class="seg-main">Cadet</span><span class="seg-sub">9×9 · 10</span></button>
        <button class="seg on" data-diff="medium" onclick="setDiff(this)"><span class="seg-main">Field</span><span class="seg-sub">16×16 · 40</span></button>
        <button class="seg" data-diff="hard" onclick="setDiff(this)"><span class="seg-main">Expert</span><span class="seg-sub">16×30 · 99</span></button>
        <button class="seg" data-diff="custom" onclick="setDiff(this)"><span class="seg-main">Custom</span></button>
      </div>
      <div id="custom-fields" style="display:none" class="custom-fields">
        <div class="custom-field"><label>Rows</label><input type="number" id="cr" min="5" max="24" value="12"/></div>
        <div class="custom-field"><label>Cols</label><input type="number" id="cc" min="5" max="30" value="16"/></div>
        <div class="custom-field"><label>Mines</label><input type="number" id="cm" min="1" max="200" value="30"/></div>
      </div>
    </div>
    <button class="btn btn-p btn-lg" onclick="launchGame()">Enter the Minefield</button>
    <div style="font-size:10px;color:var(--muted);margin-top:16px;text-align:left;border-top:1px solid var(--border);padding-top:12px;line-height:1.7">
      Left click to reveal · Right click / long press to flag<br/>First click is always safe
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="overlay" id="result-overlay" style="display:none">
  <div class="card">
    <div id="r-icon" style="font-size:44px;margin-bottom:10px"></div>
    <div class="wm" id="r-label"></div>
    <div id="r-title" style="font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;margin-bottom:6px"></div>
    <div id="r-time" style="font-size:10px;color:var(--text-dim);margin-bottom:20px;letter-spacing:.05em"></div>
    <div id="r-best" style="font-size:10px;color:var(--accent);margin-bottom:20px;letter-spacing:.05em"></div>
    <div style="display:flex;gap:9px;justify-content:center">
      <button class="btn btn-p" onclick="retry()">Try Again</button>
      <button class="btn btn-g" onclick="window.location.href='index.html'">Hub 🏆</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <button class="back-link" onclick="window.location.href='index.html'">← Hub</button>

  <!-- Player selector strip -->
  <div class="player-sel">
    <div class="ndot" style="background:var(--accent)"></div>
    <span style="font-size:10px;color:var(--text-dim);letter-spacing:.05em">Playing as</span>
    <select id="ingame-psel" style="background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;flex:1;cursor:pointer"></select>
  </div>

  <div class="hud" id="hud">
    <button class="face-btn" id="face-btn" onclick="retry()">🙂</button>
    <div class="hud-cell"><div class="hud-lbl">Mines</div><div class="hud-val" style="color:var(--flag)" id="h-mines">0</div></div>
    <div class="hud-cell"><div class="hud-lbl">Flags</div><div class="hud-val" id="h-flags">0</div></div>
    <div class="hud-cell"><div class="hud-lbl">Time</div><div class="hud-val" id="h-time">0</div></div>
    <div class="hud-cell"><div class="hud-lbl">Best</div><div class="hud-val" style="color:var(--accent)" id="h-best">—</div></div>
  </div>

  <div class="diff-tabs" id="quick-diff">
    <button class="diff-tab" data-diff="easy" onclick="quickDiff(this)">Cadet</button>
    <button class="diff-tab on" data-diff="medium" onclick="quickDiff(this)">Field</button>
    <button class="diff-tab" data-diff="hard" onclick="quickDiff(this)">Expert</button>
    <button class="diff-tab" data-diff="custom" onclick="quickDiff(this)">Custom</button>
  </div>

  <div style="overflow-x:auto;max-width:100%"><div id="board"></div></div>

  <div class="footer">
    <button class="btn btn-p" onclick="retry()">New Game</button>
    <button class="btn btn-g" onclick="document.getElementById('setup-overlay').style.display='flex'">Settings</button>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const DIFFS={easy:{rows:9,cols:9,mines:10},medium:{rows:16,cols:16,mines:40},hard:{rows:16,cols:30,mines:99}};
let currentDiff='medium', cfg={rows:16,cols:16,mines:40};
let currentPlayerId=null;
const bestTimes=JSON.parse(localStorage.getItem('ms-best')||'{}');

// ── State ───────────────────────────────────────────────────────────────────
let cells=[],gameState='idle',firstClick=true,flagCount=0,timerVal=0,timerInt=null,lpTimer=null;

function setDiff(btn){
  currentDiff=btn.dataset.diff;
  document.querySelectorAll('#diff-segs .seg').forEach(b=>b.classList.toggle('on',b===btn));
  document.getElementById('custom-fields').style.display=currentDiff==='custom'?'flex':'none';
  syncQuickDiff();
}
function syncQuickDiff(){
  document.querySelectorAll('#quick-diff .diff-tab').forEach(b=>b.classList.toggle('on',b.dataset.diff===currentDiff));
}
function quickDiff(btn){
  currentDiff=btn.dataset.diff;
  syncQuickDiff();
  applyDiff(); initGame();
}
function applyDiff(){
  if(currentDiff==='custom'){
    cfg.rows=parseInt(document.getElementById('cr').value)||12;
    cfg.cols=parseInt(document.getElementById('cc').value)||16;
    cfg.mines=parseInt(document.getElementById('cm').value)||30;
    cfg.mines=Math.min(cfg.mines,cfg.rows*cfg.cols-9);
  } else { cfg={...DIFFS[currentDiff]}; }
}

function populatePlayerSelects(){
  const pl=ACV.getPlayers();
  ['psel','ingame-psel'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel)return;
    sel.innerHTML=pl.map(p=>`<option value="${p.id}" style="background:#0e1420">${p.name}</option>`).join('');
    if(currentPlayerId)sel.value=currentPlayerId; else if(pl[0])sel.value=pl[0].id;
  });
}

function launchGame(){
  currentPlayerId=document.getElementById('psel').value;
  document.getElementById('ingame-psel').value=currentPlayerId;
  applyDiff(); syncQuickDiff();
  document.getElementById('setup-overlay').style.display='none';
  initGame();
}

function retry(){
  currentPlayerId=document.getElementById('ingame-psel').value||currentPlayerId;
  applyDiff(); initGame();
}

// ── Init ────────────────────────────────────────────────────────────────────
function initGame(){
  clearInterval(timerInt); timerVal=0; flagCount=0; firstClick=true; gameState='idle';
  cells=Array.from({length:cfg.rows},()=>Array.from({length:cfg.cols},()=>({mine:false,count:0,revealed:false,flagged:false})));
  updateHUD(); renderBoard();
  document.getElementById('face-btn').textContent='🙂';
  document.getElementById('result-overlay').style.display='none';
}

function placeMines(sr,sc){
  const safe=new Set();
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=sr+dr,nc=sc+dc;if(nr>=0&&nr<cfg.rows&&nc>=0&&nc<cfg.cols)safe.add(`${nr},${nc}`);}
  const pos=[];
  for(let r=0;r<cfg.rows;r++)for(let c=0;c<cfg.cols;c++)if(!safe.has(`${r},${c}`))pos.push([r,c]);
  for(let i=pos.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pos[i],pos[j]]=[pos[j],pos[i]];}
  pos.slice(0,cfg.mines).forEach(([r,c])=>cells[r][c].mine=true);
  for(let r=0;r<cfg.rows;r++)for(let c=0;c<cfg.cols;c++)if(!cells[r][c].mine)cells[r][c].count=nbrs(r,c).filter(([nr,nc])=>cells[nr][nc].mine).length;
}

function nbrs(r,c){const res=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(dr===0&&dc===0)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nr<cfg.rows&&nc>=0&&nc<cfg.cols)res.push([nr,nc]);}return res;}

// ── Render ──────────────────────────────────────────────────────────────────
function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML=''; board.style.gridTemplateColumns=`repeat(${cfg.cols},1fr)`;
  for(let r=0;r<cfg.rows;r++) for(let c=0;c<cfg.cols;c++){
    const el=document.createElement('button');
    el.className='cell'; el.dataset.r=r; el.dataset.c=c;
    el.addEventListener('click',onLeft);
    el.addEventListener('contextmenu',e=>{e.preventDefault();onRight(r,c);});
    el.addEventListener('touchstart',e=>{lpTimer=setTimeout(()=>{onRight(r,c);lpTimer=null;},500);},{passive:true});
    el.addEventListener('touchend',()=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}});
    el.addEventListener('touchmove',()=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}});
    board.appendChild(el);
  }
  syncAllCells();
}

const NC=['','n1','n2','n3','n4','n5','n6','n7','n8'];
function cellEl(r,c){return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);}
function syncCell(r,c){
  const el=cellEl(r,c); const cel=cells[r][c]; if(!el)return;
  el.className='cell'; el.textContent='';
  if(cel.flagged&&!cel.revealed){el.classList.add('flag');}
  else if(!cel.revealed){}
  else{
    el.classList.add('rev');
    if(cel.mine){el.classList.add('mine-r');el.textContent='💣';}
    else if(cel.count>0){el.classList.add(NC[cel.count]);el.textContent=cel.count;}
  }
}
function syncAllCells(){for(let r=0;r<cfg.rows;r++)for(let c=0;c<cfg.cols;c++)syncCell(r,c);}

// ── Interaction ─────────────────────────────────────────────────────────────
function onLeft(e){
  const r=+e.currentTarget.dataset.r, c=+e.currentTarget.dataset.c;
  if(gameState==='won'||gameState==='lost')return;
  if(cells[r][c].flagged||cells[r][c].revealed)return;
  if(firstClick){firstClick=false;placeMines(r,c);startTimer();gameState='playing';}
  if(cells[r][c].mine){detonate(r,c);return;}
  reveal(r,c); checkWin();
}
function onRight(r,c){
  if(gameState==='won'||gameState==='lost')return;
  if(cells[r][c].revealed)return;
  cells[r][c].flagged=!cells[r][c].flagged;
  flagCount+=cells[r][c].flagged?1:-1;
  syncCell(r,c); updateHUD();
}
function reveal(r,c){
  if(cells[r][c].revealed||cells[r][c].flagged||cells[r][c].mine)return;
  const queue=[[r,c]];
  while(queue.length){
    const[cr,cc]=queue.shift();
    if(cells[cr][cc].revealed)continue;
    cells[cr][cc].revealed=true; syncCell(cr,cc);
    if(cells[cr][cc].count===0)for(const[nr,nc]of nbrs(cr,cc))if(!cells[nr][nc].revealed&&!cells[nr][nc].flagged&&!cells[nr][nc].mine)queue.push([nr,nc]);
  }
}
function detonate(r,c){
  clearInterval(timerInt); gameState='lost';
  document.getElementById('face-btn').textContent='💀';
  const hitEl=cellEl(r,c); if(hitEl)hitEl.classList.add('exp');
  let delay=0;
  for(let mr=0;mr<cfg.rows;mr++)for(let mc=0;mc<cfg.cols;mc++)if(cells[mr][mc].mine&&!(mr===r&&mc===c)){
    const el=cellEl(mr,mc);
    if(el)setTimeout(()=>{cells[mr][mc].revealed=true;syncCell(mr,mc);},delay+=16);
  }
  setTimeout(()=>showResult(false),delay+380);
}
function checkWin(){
  let u=0;for(let r=0;r<cfg.rows;r++)for(let c=0;c<cfg.cols;c++)if(!cells[r][c].revealed&&!cells[r][c].mine)u++;
  if(u>0)return;
  clearInterval(timerInt); gameState='won';
  document.getElementById('face-btn').textContent='🥇';
  const key=currentDiff; const prev=bestTimes[key];
  if(!prev||timerVal<prev){bestTimes[key]=timerVal;localStorage.setItem('ms-best',JSON.stringify(bestTimes));}
  updateHUD();
  // Record to championship
  if(currentPlayerId){
    const pl=ACV.getPlayers(); const p=pl.find(x=>x.id===currentPlayerId);
    if(p) ACV.recordResult({game:'mines',players:[{id:p.id,name:p.name}],winnerId:p.id,meta:{time:timerVal,diff:currentDiff}});
  }
  setTimeout(()=>showResult(true),300);
}
function startTimer(){
  clearInterval(timerInt); timerVal=0;
  timerInt=setInterval(()=>{timerVal++;document.getElementById('h-time').textContent=timerVal;},1000);
}
function updateHUD(){
  document.getElementById('h-mines').textContent=cfg.mines;
  document.getElementById('h-flags').textContent=flagCount;
  document.getElementById('h-time').textContent=timerVal;
  const b=bestTimes[currentDiff];
  document.getElementById('h-best').textContent=b?b+'s':'—';
}
function showResult(won){
  const el=document.getElementById('result-overlay');
  document.getElementById('r-icon').textContent=won?'🎖️':'💥';
  document.getElementById('r-label').textContent=won?'Mission complete':'Mine detonated';
  document.getElementById('r-title').textContent=won?'Cleared':'Detonated';
  document.getElementById('r-time').textContent=won?`Completed in ${timerVal} seconds`:`Survived ${timerVal} seconds`;
  const b=bestTimes[currentDiff];
  document.getElementById('r-best').textContent=b?`Personal best: ${b}s`:'';
  el.style.display='flex';
}

// Init
populatePlayerSelects();
document.getElementById('ingame-psel').addEventListener('change',e=>{currentPlayerId=e.target.value;});
</script>
</body>
</html>
