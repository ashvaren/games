<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Dots &amp; Boxes — Ashvaren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="ashvaren.js"></script>
  <style>
    :root{--bg:#080c14;--surface:#0e1420;--surface2:#111926;--border:#1a2535;--accent:#2e6fc4;--text:#d8e2f0;--text-dim:#6a7a90;--muted:#3a4a5a}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg)}
    body{font-family:'DM Mono','Courier New',monospace;color:var(--text);-webkit-tap-highlight-color:transparent}
    button{-webkit-appearance:none;cursor:pointer;font-family:'DM Mono',monospace}
    .overlay{position:fixed;inset:0;background:rgba(8,12,20,0.96);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;overflow-y:auto}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px 28px;max-width:420px;width:100%;text-align:center}
    .wm{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:12px;letter-spacing:0.22em;color:var(--text-dim);margin-bottom:4px}
    .gtitle{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:34px;letter-spacing:0.03em;margin-bottom:4px;color:#e05c3a}
    .gsub{font-size:9px;letter-spacing:0.18em;color:var(--muted);margin-bottom:26px;text-transform:uppercase}
    .sec-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;text-align:left}
    .sec{margin-bottom:18px;text-align:left}
    .seg-row{display:flex;gap:7px}
    .seg{flex:1;padding:9px 4px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:border-color .15s,background .15s;cursor:pointer}
    .seg:hover{border-color:var(--accent)}
    .seg.on{border-color:var(--accent);background:rgba(46,111,196,.15)}
    .seg-main{font-weight:700;letter-spacing:.05em}
    .seg-sub{font-size:8px;color:var(--muted)}
    .name-row{display:flex;align-items:center;gap:9px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:7px 11px;margin-bottom:7px}
    .ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .nin{background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;flex:1;letter-spacing:.04em}
    .btn{padding:8px 18px;border-radius:6px;border:none;font-size:11px;font-weight:700;letter-spacing:.07em;transition:opacity .15s;cursor:pointer}
    .btn:hover{opacity:.82}
    .btn-p{background:#e05c3a;color:#fff}
    .btn-a{background:var(--accent);color:#fff}
    .btn-g{background:transparent;border:1.5px solid var(--border);color:var(--text-dim)}
    .btn-lg{width:100%;padding:13px;font-size:12px;border-radius:9px;margin-top:6px}
    .diff-btn{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-family:'DM Mono',monospace;text-align:left;transition:border-color .15s,background .15s;margin-bottom:6px;width:100%}
    .diff-btn.on{border-color:var(--accent);background:rgba(46,111,196,.14)}
    .diff-lbl{font-size:11px;font-weight:700;color:var(--text);letter-spacing:.05em;min-width:58px}
    .diff-desc{font-size:9px;color:var(--muted);letter-spacing:.03em}
    #game{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 16px 40px;gap:10px}
    .turn-banner{color:#fff;font-size:13px;font-weight:700;letter-spacing:.07em;padding:11px 30px;border-radius:40px;transition:background .3s,box-shadow .3s;text-align:center;min-width:200px}
    .score-row{display:flex;gap:10px}
    .score-card{border:2px solid;border-radius:10px;overflow:hidden;min-width:130px;position:relative;transition:transform .2s,box-shadow .2s,background .2s,border-color .2s}
    .sc-bar{height:3px;transition:opacity .2s}
    .sc-inner{padding:8px 12px;display:flex;align-items:center;gap:8px}
    .sc-name{color:var(--text-dim);font-size:10px;letter-spacing:.05em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .sc-tag{font-size:8px;color:#3a6e9e;letter-spacing:.05em;margin-top:1px}
    .sc-num{font-size:22px;font-weight:700;line-height:1}
    .sc-arr{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:8px;opacity:.6}
    .svg-wrap{display:flex;justify-content:center}
    .footer{display:flex;gap:8px;margin-top:2px}
    .back-link{font-size:10px;color:var(--text-dim);letter-spacing:.06em;cursor:pointer;background:none;border:none;margin-bottom:4px}
    .back-link:hover{color:var(--text)}
  </style>
</head>
<body>

<!-- SETUP OVERLAY -->
<div class="overlay" id="setup-overlay">
  <div class="card">
    <button class="back-link" onclick="window.location.href='index.html'">← Hub</button>
    <div class="wm">Ashvaren</div>
    <div class="gtitle">Dots &amp; Boxes</div>
    <div class="gsub">Strategy · Grid · Championship</div>

    <!-- Step 0: mode -->
    <div id="step0">
      <div class="sec"><div class="sec-lbl">Game mode</div>
        <div class="seg-row">
          <button class="seg on" id="mode-hvh" onclick="setMode('hvh')"><span class="seg-main">Two Players</span><span class="seg-sub">Local</span></button>
          <button class="seg" id="mode-hvc" onclick="setMode('hvc')"><span class="seg-main">vs Computer</span><span class="seg-sub">AI</span></button>
        </div>
      </div>
      <div class="sec"><div class="sec-lbl">Grid size</div>
        <div class="seg-row" id="size-segs">
          <button class="seg" data-size="4" onclick="setSz(this)"><span class="seg-main">Small</span><span class="seg-sub">3×3</span></button>
          <button class="seg on" data-size="6" onclick="setSz(this)"><span class="seg-main">Medium</span><span class="seg-sub">5×5</span></button>
          <button class="seg" data-size="8" onclick="setSz(this)"><span class="seg-main">Large</span><span class="seg-sub">7×7</span></button>
        </div>
      </div>
      <button class="btn btn-p btn-lg" onclick="goStep1()">Next →</button>
    </div>

    <!-- Step 1: players + ai level -->
    <div id="step1" style="display:none">
      <div class="sec"><div class="sec-lbl">Player names</div>
        <div class="name-row"><div class="ndot" style="background:#e05c3a"></div>
          <select class="nin" id="p1sel" style="cursor:pointer"></select>
        </div>
        <div class="name-row" id="p2-row"><div class="ndot" style="background:#3a9ee0"></div>
          <select class="nin" id="p2sel" style="cursor:pointer"></select>
        </div>
      </div>
      <div class="sec" id="ai-sec" style="display:none"><div class="sec-lbl">AI difficulty</div>
        <button class="diff-btn" data-lv="easy" onclick="setLv(this)"><span class="diff-lbl">Easy</span><span class="diff-desc">Greedy — takes boxes, otherwise random</span></button>
        <button class="diff-btn on" data-lv="medium" onclick="setLv(this)"><span class="diff-lbl">Medium</span><span class="diff-desc">Avoids gifting boxes to you</span></button>
        <button class="diff-btn" data-lv="hard" onclick="setLv(this)"><span class="diff-lbl">Hard</span><span class="diff-desc">Minimax lookahead, depth 4</span></button>
        <button class="diff-btn" data-lv="extreme" onclick="setLv(this)"><span class="diff-lbl">Extreme</span><span class="diff-desc">Minimax lookahead, depth 7</span></button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-g" onclick="goStep0()" style="flex:0 0 auto">← Back</button>
        <button class="btn btn-p btn-lg" style="flex:1" onclick="launchGame()">Start Game</button>
      </div>
    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="overlay" id="win-overlay" style="display:none">
  <div class="card">
    <div class="wm" style="margin-bottom:8px">Result</div>
    <div id="win-icon" style="font-size:40px;margin-bottom:8px"></div>
    <div id="win-name" style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;margin-bottom:4px"></div>
    <div id="win-sub" style="font-size:10px;color:var(--text-dim);margin-bottom:20px;letter-spacing:.06em"></div>
    <div style="display:flex;gap:9px;justify-content:center">
      <button class="btn btn-p" onclick="rematch()">Rematch</button>
      <button class="btn btn-a" onclick="newSetup()">New Game</button>
      <button class="btn btn-g" onclick="window.location.href='index.html'">Hub</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" style="display:none">
  <button class="back-link" onclick="newSetup()">← Menu</button>
  <div class="turn-banner" id="turn-banner">—</div>
  <div class="score-row" id="score-row"></div>
  <div class="svg-wrap"><svg id="board"></svg></div>
  <div class="footer">
    <button class="btn btn-p" onclick="rematch()">New Game</button>
    <button class="btn btn-g" onclick="window.location.href='index.html'">Hub 🏆</button>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const GRID_SIZES={small:4,medium:6,large:8};
const CELL_SIZES={4:80,6:66,8:54};
let cfg={mode:'hvh',gs:6,aiLevel:'medium',players:[]};
let currentCfg=null;

// ── Game state ──────────────────────────────────────────────────────────────
let edges,boxes,current,scores,gameOver,hovered,aiThinking;
let boxesRef,scoresRef;

// ── Setup helpers ───────────────────────────────────────────────────────────
function setMode(m){
  cfg.mode=m;
  ['hvh','hvc'].forEach(x=>document.getElementById('mode-'+x).classList.toggle('on',x===m));
  document.getElementById('p2-row').style.display=m==='hvc'?'none':'flex';
  document.getElementById('ai-sec').style.display=m==='hvc'?'block':'none';
}
function setSz(btn){
  cfg.gs=+btn.dataset.size;
  document.querySelectorAll('#size-segs .seg').forEach(b=>b.classList.toggle('on',b===btn));
}
function setLv(btn){
  cfg.aiLevel=btn.dataset.lv;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('on',b===btn));
}
function populateSelects(){
  const players=ACV.getPlayers();
  ['p1sel','p2sel'].forEach((id,i)=>{
    const sel=document.getElementById(id);
    sel.innerHTML=players.map(p=>`<option value="${p.id}" style="background:#0e1420">${p.name}</option>`).join('');
    if(players[i]) sel.value=players[i].id;
  });
}
function goStep1(){document.getElementById('step0').style.display='none';document.getElementById('step1').style.display='block';populateSelects();}
function goStep0(){document.getElementById('step1').style.display='none';document.getElementById('step0').style.display='block';}

function launchGame(){
  const players=ACV.getPlayers();
  const pmap=Object.fromEntries(players.map(p=>[p.id,p]));
  const p1id=document.getElementById('p1sel').value;
  const p1=pmap[p1id]||players[0];
  const pColors=['#e05c3a','#3a9ee0'];
  if(cfg.mode==='hvc'){
    cfg.players=[
      {...p1,colour:pColors[0],light:pColors[0]+'28'},
      {id:'cpu',name:'Computer',colour:pColors[1],light:pColors[1]+'28',initial:'CPU'},
    ];
  } else {
    const p2id=document.getElementById('p2sel').value;
    const p2=pmap[p2id]||players[1]||players[0];
    cfg.players=[
      {...p1,colour:pColors[0],light:pColors[0]+'28'},
      {...p2,colour:pColors[1],light:pColors[1]+'28'},
    ];
  }
  cfg.players.forEach((p,i)=>{if(!p.initial)p.initial=p.name.slice(0,3).toUpperCase();});
  currentCfg={...cfg,players:[...cfg.players]};
  startGame();
}

function newSetup(){
  document.getElementById('win-overlay').style.display='none';
  document.getElementById('game').style.display='none';
  document.getElementById('step0').style.display='block';
  document.getElementById('step1').style.display='none';
  document.getElementById('setup-overlay').style.display='flex';
}
function rematch(){ if(currentCfg){cfg={...currentCfg,players:[...currentCfg.players]};startGame();} }

// ── Game logic ──────────────────────────────────────────────────────────────
function initEdges(s){return{h:Array.from({length:s},()=>Array(s-1).fill(null)),v:Array.from({length:s-1},()=>Array(s).fill(null))};}
function initBoxes(s){return Array.from({length:s-1},()=>Array(s-1).fill(null));}
function checkBox(e,r,c){return e.h[r][c]!==null&&e.h[r+1][c]!==null&&e.v[r][c]!==null&&e.v[r][c+1]!==null;}
function clone(e){return{h:e.h.map(r=>[...r]),v:e.v.map(r=>[...r])};}

function startGame(){
  document.getElementById('setup-overlay').style.display='none';
  document.getElementById('win-overlay').style.display='none';
  document.getElementById('game').style.display='flex';
  const gs=cfg.gs;
  boxesRef=initBoxes(gs); scoresRef=[0,0];
  edges=initEdges(gs); boxes=boxesRef;
  current=0; scores=[0,0]; gameOver=false; hovered=null; aiThinking=false;
  renderScoreRow();
  renderBoard();
  updateBanner();
}

function processMove(ne,pidx){
  const gs=cfg.gs, nb=boxesRef.map(r=>[...r]);
  let claimed=0;
  for(let r=0;r<gs-1;r++) for(let c=0;c<gs-1;c++)
    if(nb[r][c]===null&&checkBox(ne,r,c)){nb[r][c]=pidx;claimed++;}
  const ns=[...scoresRef]; ns[pidx]+=claimed;
  boxesRef=nb; scoresRef=ns;
  boxes=nb; scores=[...ns];
  renderBoard(); updateScores();
  if(ns[0]+ns[1]===(gs-1)*(gs-1)){
    gameOver=true;
    const winner=ns[0]>ns[1]?0:ns[1]>ns[0]?1:-1;
    // Record result
    const pl=cfg.players;
    if(pl[0].id!=='cpu'&&pl[1].id!=='cpu'){
      ACV.recordResult({game:'dots',players:[{id:pl[0].id,name:pl[0].name},{id:pl[1].id,name:pl[1].name}],winnerId:winner===-1?null:pl[winner].id});
    }
    setTimeout(()=>showWin(winner),400);
    return{next:pidx,done:true};
  }
  const next=claimed>0?pidx:1-pidx;
  current=next; updateBanner(); updateScores();
  return{next,done:false};
}

function runAI(curEdges,delay){
  setTimeout(()=>{
    const mv=getAIMove(curEdges,boxesRef,cfg.gs,cfg.aiLevel);
    if(!mv){aiThinking=false;return;}
    const ae=clone(curEdges);
    if(mv.type==='h')ae.h[mv.r][mv.c]=1; else ae.v[mv.r][mv.c]=1;
    edges=ae;
    const{next,done}=processMove(ae,1);
    if(done){aiThinking=false;return;}
    if(next===1)runAI(ae,320); else aiThinking=false;
  },delay);
}

function handleEdge(type,r,c){
  if(gameOver||aiThinking)return;
  if(cfg.mode==='hvc'&&current===1)return;
  const arr=type==='h'?edges.h:edges.v;
  if(arr[r][c]!==null)return;
  const ne=clone(edges); edges=ne;
  if(type==='h')ne.h[r][c]=current; else ne.v[r][c]=current;
  const{next,done}=processMove(ne,current);
  if(!done&&cfg.mode==='hvc'&&next===1){aiThinking=true;runAI(ne,440);}
}

// ── AI ──────────────────────────────────────────────────────────────────────
function countNew(e,b,gs){let n=0;for(let r=0;r<gs-1;r++)for(let c=0;c<gs-1;c++)if(b[r][c]===null&&checkBox(e,r,c))n++;return n;}
function giveOpp(e,b,gs){for(let r=0;r<gs-1;r++)for(let c=0;c<gs-1;c++)if(b[r][c]===null){const s=(e.h[r][c]!==null?1:0)+(e.h[r+1][c]!==null?1:0)+(e.v[r][c]!==null?1:0)+(e.v[r][c+1]!==null?1:0);if(s===3)return true;}return false;}
function getMoves(e,gs){const m=[];for(let r=0;r<gs;r++)for(let c=0;c<gs-1;c++)if(e.h[r][c]===null)m.push({type:'h',r,c});for(let r=0;r<gs-1;r++)for(let c=0;c<gs;c++)if(e.v[r][c]===null)m.push({type:'v',r,c});return m;}
function applyM(e,b,m,p,gs){const ne=clone(e),nb=b.map(r=>[...r]);if(m.type==='h')ne.h[m.r][m.c]=p;else ne.v[m.r][m.c]=p;let cl=0;for(let r=0;r<gs-1;r++)for(let c=0;c<gs-1;c++)if(nb[r][c]===null&&checkBox(ne,r,c)){nb[r][c]=p;cl++;}return{ne,nb,cl};}
function scoreP(b,gs){let s=0;for(let r=0;r<gs-1;r++)for(let c=0;c<gs-1;c++){if(b[r][c]===1)s++;else if(b[r][c]===0)s--;}return s;}

function minimax(e,b,gs,depth,alpha,beta,isAI,total){
  const filled=b.flat().filter(v=>v!==null).length;
  if(depth===0||filled===total)return scoreP(b,gs);
  const moves=getMoves(e,gs);
  if(!moves.length)return scoreP(b,gs);
  if(isAI){
    let best=-Infinity;
    for(const m of moves){const{ne,nb,cl}=applyM(e,b,m,1,gs);const v=minimax(ne,nb,gs,depth-1,alpha,beta,cl>0,total);best=Math.max(best,v);alpha=Math.max(alpha,v);if(beta<=alpha)break;}
    return best;
  } else {
    let best=Infinity;
    for(const m of moves){const{ne,nb,cl}=applyM(e,b,m,0,gs);const v=minimax(ne,nb,gs,depth-1,alpha,beta,cl>0?false:true,total);best=Math.min(best,v);beta=Math.min(beta,v);if(beta<=alpha)break;}
    return best;
  }
}

function getAIMove(e,b,gs,level){
  const moves=getMoves(e,gs);
  if(!moves.length)return null;
  for(const m of moves){const{cl}=applyM(e,b,m,1,gs);if(cl>0)return m;}
  if(level==='easy'){return moves[Math.floor(Math.random()*moves.length)];}
  if(level==='medium'){const safe=moves.filter(m=>{const{ne}=applyM(e,b,m,1,gs);return!giveOpp(ne,b,gs);});return(safe.length?safe:moves)[Math.floor(Math.random()*(safe.length||moves.length))];}
  const depth=level==='hard'?4:7;
  const total=(gs-1)*(gs-1);
  let best=-Infinity,bestM=null;
  for(const m of moves){const{ne,nb,cl}=applyM(e,b,m,1,gs);const v=minimax(ne,nb,gs,depth-1,-Infinity,Infinity,cl>0,total);if(v>best){best=v;bestM=m;}}
  return bestM;
}

// ── Render ──────────────────────────────────────────────────────────────────
function renderScoreRow(){
  const el=document.getElementById('score-row');
  el.innerHTML=cfg.players.map((p,i)=>`
    <div class="score-card" id="sc${i}" style="border-color:${i===current?p.colour:'#1a2535'};background:${i===current?p.light:'#0e1420'};transform:${i===current?'scale(1.04)':'scale(1)'}">
      <div class="sc-bar" style="background:${p.colour};opacity:${i===current?1:0.3}"></div>
      <div class="sc-inner">
        <div style="flex:1;min-width:0"><div class="sc-name">${p.name}</div>${cfg.mode==='hvc'&&i===1?`<div class="sc-tag">${cfg.aiLevel}</div>`:''}</div>
        <div class="sc-num" style="color:${p.colour}" id="sc-num${i}">${scores[i]}</div>
      </div>
      ${i===current&&!gameOver?`<div class="sc-arr" style="color:${p.colour}">▶</div>`:''}
    </div>`).join('');
}
function updateScores(){
  cfg.players.forEach((p,i)=>{
    const card=document.getElementById('sc'+i);
    if(!card)return;
    card.style.borderColor=i===current&&!gameOver?p.colour:'#1a2535';
    card.style.background=i===current&&!gameOver?p.light:'#0e1420';
    card.style.transform=i===current&&!gameOver?'scale(1.04)':'scale(1)';
    const arr=card.querySelector('.sc-arr');
    if(arr)arr.style.display=i===current&&!gameOver?'block':'none';
    const numEl=document.getElementById('sc-num'+i);
    if(numEl)numEl.textContent=scores[i];
  });
}
function updateBanner(){
  const el=document.getElementById('turn-banner');
  const p=cfg.players[current];
  if(gameOver)return;
  el.style.background=p.colour;
  el.style.boxShadow=`0 0 24px ${p.colour}44`;
  el.textContent=aiThinking?`${cfg.players[1].name} thinking…`:`${p.name}'s turn`;
}

function renderBoard(){
  const svg=document.getElementById('board');
  const gs=cfg.gs, CELL=CELL_SIZES[gs]||66, DOT=7, PAD=28, ET=5, CZ=20;
  const sz=PAD*2+CELL*(gs-1);
  svg.setAttribute('width',sz); svg.setAttribute('height',sz);
  svg.innerHTML='';
  // Box fills
  boxes.forEach((row,r)=>row.forEach((owner,c)=>{
    if(owner===null)return;
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',PAD+c*CELL+ET/2); rect.setAttribute('y',PAD+r*CELL+ET/2);
    rect.setAttribute('width',CELL-ET); rect.setAttribute('height',CELL-ET);
    rect.setAttribute('fill',cfg.players[owner].light); rect.setAttribute('rx',3);
    svg.appendChild(rect);
  }));
  // H edges
  edges.h.forEach((row,r)=>row.forEach((owner,c)=>{
    const x1=PAD+c*CELL+DOT/2,x2=PAD+(c+1)*CELL-DOT/2,y=PAD+r*CELL;
    const hov=hovered?.type==='h'&&hovered.r===r&&hovered.c===c;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y);line.setAttribute('x2',x2);line.setAttribute('y2',y);
    line.setAttribute('stroke',owner!==null?cfg.players[owner].colour:hov?cfg.players[current].colour:'#1e2a3a');
    line.setAttribute('stroke-width',owner!==null?ET:hov?ET-1:2);
    line.setAttribute('stroke-linecap','round');
    svg.appendChild(line);
    if(owner===null&&!gameOver&&!(cfg.mode==='hvc'&&current===1)&&!aiThinking){
      const hit=document.createElementNS('http://www.w3.org/2000/svg','line');
      hit.setAttribute('x1',x1);hit.setAttribute('y1',y);hit.setAttribute('x2',x2);hit.setAttribute('y2',y);
      hit.setAttribute('stroke','transparent');hit.setAttribute('stroke-width',CZ);hit.style.cursor='pointer';
      hit.addEventListener('mouseenter',()=>{hovered={type:'h',r,c};renderBoard();});
      hit.addEventListener('mouseleave',()=>{hovered=null;renderBoard();});
      hit.addEventListener('click',()=>handleEdge('h',r,c));
      svg.appendChild(hit);
    }
  }));
  // V edges
  edges.v.forEach((row,r)=>row.forEach((owner,c)=>{
    const x=PAD+c*CELL,y1=PAD+r*CELL+DOT/2,y2=PAD+(r+1)*CELL-DOT/2;
    const hov=hovered?.type==='v'&&hovered.r===r&&hovered.c===c;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x);line.setAttribute('y1',y1);line.setAttribute('x2',x);line.setAttribute('y2',y2);
    line.setAttribute('stroke',owner!==null?cfg.players[owner].colour:hov?cfg.players[current].colour:'#1e2a3a');
    line.setAttribute('stroke-width',owner!==null?ET:hov?ET-1:2);
    line.setAttribute('stroke-linecap','round');
    svg.appendChild(line);
    if(owner===null&&!gameOver&&!(cfg.mode==='hvc'&&current===1)&&!aiThinking){
      const hit=document.createElementNS('http://www.w3.org/2000/svg','line');
      hit.setAttribute('x1',x);hit.setAttribute('y1',y1);hit.setAttribute('x2',x);hit.setAttribute('y2',y2);
      hit.setAttribute('stroke','transparent');hit.setAttribute('stroke-width',CZ);hit.style.cursor='pointer';
      hit.addEventListener('mouseenter',()=>{hovered={type:'v',r,c};renderBoard();});
      hit.addEventListener('mouseleave',()=>{hovered=null;renderBoard();});
      hit.addEventListener('click',()=>handleEdge('v',r,c));
      svg.appendChild(hit);
    }
  }));
  // Initials
  boxes.forEach((row,r)=>row.forEach((owner,c)=>{
    if(owner===null)return;
    const CELL2=CELL_SIZES[gs]||66;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',PAD+c*CELL2+CELL2/2); t.setAttribute('y',PAD+r*CELL2+CELL2/2+5);
    t.setAttribute('text-anchor','middle'); t.setAttribute('fill',cfg.players[owner].colour);
    t.setAttribute('font-size',Math.max(9,Math.floor(CELL2*0.22)));
    t.setAttribute('font-family',"'DM Mono',monospace"); t.setAttribute('font-weight','700');
    t.style.userSelect='none'; t.style.pointerEvents='none';
    t.textContent=cfg.players[owner].initial;
    svg.appendChild(t);
  }));
  // Dots
  for(let r=0;r<gs;r++) for(let c=0;c<gs;c++){
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',PAD+c*CELL); circle.setAttribute('cy',PAD+r*CELL);
    circle.setAttribute('r',DOT/2); circle.setAttribute('fill','#c8d0e0');
    svg.appendChild(circle);
  }
}

function showWin(winner){
  const el=document.getElementById('win-overlay');
  const nm=document.getElementById('win-name');
  const ic=document.getElementById('win-icon');
  const sb=document.getElementById('win-sub');
  if(winner===-1){ic.textContent='🤝';nm.textContent='Draw';nm.style.color='var(--text-dim)';sb.textContent=`${scores[0]} — ${scores[1]}`;}
  else{ic.textContent='🏆';nm.textContent=cfg.players[winner].name;nm.style.color=cfg.players[winner].colour;sb.textContent=`Won ${scores[winner]}–${scores[1-winner]}`;}
  const ban=document.getElementById('turn-banner');
  ban.style.background=winner===-1?'#2a3a4a':cfg.players[winner].colour;
  ban.textContent=winner===-1?'Draw!':`${cfg.players[winner].name} wins!`;
  el.style.display='flex';
}

// init
setMode('hvh');
</script>
</body>
</html>
