<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

// ── Constants ──────────────────────────────────────────────────────────────────
const GRID_SIZES = {
  small:  { dots: 4, label: "Small",  sub: "3 × 3" },
  medium: { dots: 6, label: "Medium", sub: "5 × 5" },
  large:  { dots: 8, label: "Large",  sub: "7 × 7" },
};
const CELL_SIZES = { small: 80, medium: 66, large: 54 };
const P_COLORS   = ["#e05c3a", "#3a9ee0"];
const P_LIGHTS   = ["#e05c3a28", "#3a9ee028"];

const AI_LEVELS = {
  easy:    { label: "Easy",        desc: "Greedy — takes boxes, otherwise random" },
  medium:  { label: "Medium",      desc: "Avoids gifting boxes to opponent" },
  hard:    { label: "Hard",        desc: "Minimax lookahead (depth 4)" },
  extreme: { label: "Extreme",     desc: "Minimax lookahead (depth 7)" },
};

// ── Game logic helpers ─────────────────────────────────────────────────────────
function initEdges(size) {
  return {
    h: Array.from({ length: size },     () => Array(size - 1).fill(null)),
    v: Array.from({ length: size - 1 }, () => Array(size).fill(null)),
  };
}
function initBoxes(size) {
  return Array.from({ length: size - 1 }, () => Array(size - 1).fill(null));
}
function checkBox(edges, r, c) {
  return edges.h[r][c] !== null && edges.h[r+1][c] !== null &&
         edges.v[r][c] !== null && edges.v[r][c+1]  !== null;
}
function cloneEdges(e) {
  return { h: e.h.map(r => [...r]), v: e.v.map(r => [...r]) };
}
function cloneBoxes(b) {
  return b.map(r => [...r]);
}
function applyMove(edges, boxes, move, player, gs) {
  const ne = cloneEdges(edges);
  const nb = cloneBoxes(boxes);
  if (move.type === "h") ne.h[move.r][move.c] = player;
  else ne.v[move.r][move.c] = player;
  let claimed = 0;
  for (let r = 0; r < gs-1; r++)
    for (let c = 0; c < gs-1; c++)
      if (nb[r][c] === null && checkBox(ne, r, c)) { nb[r][c] = player; claimed++; }
  return { ne, nb, claimed };
}
function getLegalMoves(edges, gs) {
  const moves = [];
  for (let r = 0; r < gs; r++)
    for (let c = 0; c < gs-1; c++)
      if (edges.h[r][c] === null) moves.push({ type:"h", r, c });
  for (let r = 0; r < gs-1; r++)
    for (let c = 0; c < gs; c++)
      if (edges.v[r][c] === null) moves.push({ type:"v", r, c });
  return moves;
}
function sideCount(edges, r, c) {
  return (edges.h[r][c]!==null?1:0) + (edges.h[r+1][c]!==null?1:0) +
         (edges.v[r][c]!==null?1:0) + (edges.v[r][c+1]!==null?1:0);
}
function scorePosition(boxes, gs) {
  let s = 0;
  for (let r = 0; r < gs-1; r++)
    for (let c = 0; c < gs-1; c++)
      if (boxes[r][c] === 1) s++;
      else if (boxes[r][c] === 0) s--;
  return s;
}

// ── AI implementations ─────────────────────────────────────────────────────────

// Easy: claim if available, otherwise random (may gift boxes)
function aiEasy(edges, boxes, gs) {
  const moves = getLegalMoves(edges, gs);
  for (const m of moves) {
    const { claimed } = applyMove(edges, boxes, m, 1, gs);
    if (claimed > 0) return m;
  }
  return moves[Math.floor(Math.random() * moves.length)] || null;
}

// Medium: claim if available, otherwise avoid gifting 3-sided boxes
function aiMedium(edges, boxes, gs) {
  const moves = getLegalMoves(edges, gs);
  // 1. take any completing move
  for (const m of moves) {
    const { claimed } = applyMove(edges, boxes, m, 1, gs);
    if (claimed > 0) return m;
  }
  // 2. avoid moves that complete a box for opponent (3-sided)
  const safe = moves.filter(m => {
    const { ne } = applyMove(edges, boxes, m, 1, gs);
    for (let r = 0; r < gs-1; r++)
      for (let c = 0; c < gs-1; c++)
        if (boxes[r][c] === null && sideCount(ne, r, c) === 3) return false;
    return true;
  });
  const pool = safe.length ? safe : moves;
  return pool[Math.floor(Math.random() * pool.length)];
}

// Minimax with alpha-beta pruning
function minimax(edges, boxes, gs, depth, alpha, beta, isAI, totalBoxes) {
  const filled = boxes.flat().filter(v => v !== null).length;
  if (depth === 0 || filled === totalBoxes) return scorePosition(boxes, gs);

  const moves = getLegalMoves(edges, gs);
  if (moves.length === 0) return scorePosition(boxes, gs);

  if (isAI) {
    let best = -Infinity;
    for (const m of moves) {
      const { ne, nb, claimed } = applyMove(edges, boxes, m, 1, gs);
      const val = minimax(ne, nb, gs, depth - 1, alpha, beta, claimed > 0 ? true : false, totalBoxes);
      best = Math.max(best, val);
      alpha = Math.max(alpha, val);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const m of moves) {
      const { ne, nb, claimed } = applyMove(edges, boxes, m, 0, gs);
      const val = minimax(ne, nb, gs, depth - 1, alpha, beta, claimed > 0 ? false : true, totalBoxes);
      best = Math.min(best, val);
      beta = Math.min(beta, val);
      if (beta <= alpha) break;
    }
    return best;
  }
}

function aiMinimax(edges, boxes, gs, depth) {
  const totalBoxes = (gs-1)*(gs-1);
  const moves = getLegalMoves(edges, gs);
  if (!moves.length) return null;

  // Always take a completing move immediately without searching
  for (const m of moves) {
    const { claimed } = applyMove(edges, boxes, m, 1, gs);
    if (claimed > 0) return m;
  }

  let bestVal = -Infinity, bestMove = null;
  for (const m of moves) {
    const { ne, nb, claimed } = applyMove(edges, boxes, m, 1, gs);
    const val = minimax(ne, nb, gs, depth - 1, -Infinity, Infinity, claimed > 0, totalBoxes);
    if (val > bestVal) { bestVal = val; bestMove = m; }
  }
  return bestMove;
}

function getAIMove(edges, boxes, gs, level) {
  if (level === "easy")    return aiEasy(edges, boxes, gs);
  if (level === "medium")  return aiMedium(edges, boxes, gs);
  if (level === "hard")    return aiMinimax(edges, boxes, gs, 4);
  if (level === "extreme") return aiMinimax(edges, boxes, gs, 7);
  return aiMedium(edges, boxes, gs);
}

// ── Championship storage ───────────────────────────────────────────────────────
const CHAMP_KEY = "championship-records";

function loadChampionship() {
  try {
    const raw = localStorage.getItem(CHAMP_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveChampionship(data) {
  try { localStorage.setItem(CHAMP_KEY, JSON.stringify(data)); } catch {}
}
function pairKey(n1, n2) {
  return [n1, n2].sort().join("|||");
}
function recordResult(champ, name1, name2, winnerName) {
  const key = pairKey(name1, name2);
  if (!champ[key]) champ[key] = { players: [name1, name2].sort(), wins: {}, draws: 0 };
  if (winnerName === null) {
    champ[key].draws = (champ[key].draws || 0) + 1;
  } else {
    champ[key].wins[winnerName] = (champ[key].wins[winnerName] || 0) + 1;
  }
  return { ...champ };
}

// ── Setup screen ───────────────────────────────────────────────────────────────
function SetupScreen({ onStart, onShowChampionship }) {
  const [gridSize, setGridSize] = useState("medium");
  const [mode, setMode]         = useState(null);
  const [aiLevel, setAiLevel]   = useState("medium");
  const [p1Name, setP1Name]     = useState("");
  const [p2Name, setP2Name]     = useState("");
  const [step, setStep]         = useState(0); // 0=home 1=configure

  const proceed = (m) => { setMode(m); setStep(1); };

  const launch = () => {
    const n1    = p1Name.trim() || "Player 1";
    const n2    = mode === "hvc" ? "Computer" : (p2Name.trim() || "Player 2");
    const init1 = n1.slice(0,3).toUpperCase();
    const init2 = mode === "hvc" ? "CPU" : n2.slice(0,3).toUpperCase();
    onStart({ mode, gridSize, aiLevel, players: [
      { name: n1, initial: init1, color: P_COLORS[0], light: P_LIGHTS[0] },
      { name: n2, initial: init2, color: P_COLORS[1], light: P_LIGHTS[1] },
    ]});
  };

  if (step === 0) return (
    <div style={S.root}>
      <div style={S.card}>
        <div style={S.dotRow}>
          {[0,1,2,3].map(i => <span key={i} style={{...S.titleDot, background:i%2===0?"#e05c3a":"#3a9ee0"}} />)}
        </div>
        <h1 style={S.title}>DOTS &amp; BOXES</h1>
        <p style={S.subtitle}>Classic grid strategy. Claim the boxes. Most wins.</p>
        <div style={{...S.btnGroup, marginTop:32}}>
          <button style={{...S.btn, background:"#e05c3a"}} onClick={() => proceed("hvh")}>
            <span style={S.btnMain}>Two Players</span>
            <span style={S.btnSub}>Play against a friend</span>
          </button>
          <button style={{...S.btn, background:"#3a9ee0"}} onClick={() => proceed("hvc")}>
            <span style={S.btnMain}>vs Computer</span>
            <span style={S.btnSub}>Challenge the AI</span>
          </button>
        </div>
        <button style={S.champLink} onClick={onShowChampionship}>
          🏆 Championship table
        </button>
      </div>
    </div>
  );

  return (
    <div style={S.root}>
      <div style={{...S.card, maxWidth:440}}>
        <button style={S.backBtn} onClick={() => setStep(0)}>← Back</button>
        <h2 style={{...S.title, fontSize:19, marginBottom:22}}>SET UP GAME</h2>

        {/* Grid size */}
        <div style={S.section}>
          <div style={S.sectionLabel}>Grid size</div>
          <div style={S.segGroup}>
            {Object.entries(GRID_SIZES).map(([key, val]) => (
              <button key={key} style={{...S.seg, ...(gridSize===key?S.segActive:{})}} onClick={() => setGridSize(key)}>
                <span style={S.segMain}>{val.label}</span>
                <span style={S.segSub}>{val.sub}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Player names */}
        <div style={S.section}>
          <div style={S.sectionLabel}>Player names</div>
          <div style={S.nameList}>
            <div style={S.nameField}>
              <div style={{...S.nameDot, background:P_COLORS[0]}} />
              <input style={S.nameInput} placeholder="Player 1" value={p1Name}
                maxLength={12} onChange={e => setP1Name(e.target.value)} />
            </div>
            {mode === "hvh" && (
              <div style={S.nameField}>
                <div style={{...S.nameDot, background:P_COLORS[1]}} />
                <input style={S.nameInput} placeholder="Player 2" value={p2Name}
                  maxLength={12} onChange={e => setP2Name(e.target.value)} />
              </div>
            )}
          </div>
        </div>

        {/* AI difficulty */}
        {mode === "hvc" && (
          <div style={S.section}>
            <div style={S.sectionLabel}>AI difficulty</div>
            <div style={{display:"flex", flexDirection:"column", gap:6}}>
              {Object.entries(AI_LEVELS).map(([key, val]) => (
                <button key={key}
                  style={{...S.diffBtn, ...(aiLevel===key ? S.diffBtnActive : {})}}
                  onClick={() => setAiLevel(key)}
                >
                  <span style={S.diffLabel}>{val.label}</span>
                  <span style={S.diffDesc}>{val.desc}</span>
                </button>
              ))}
            </div>
          </div>
        )}

        <button style={{...S.btn, background:"#2e6fc4"}} onClick={launch}>
          <span style={S.btnMain}>Start Game</span>
        </button>
      </div>
    </div>
  );
}

// ── Championship screen ────────────────────────────────────────────────────────
function ChampionshipScreen({ onBack, onClear }) {
  const champ = loadChampionship();
  const pairs = Object.values(champ);

  return (
    <div style={S.root}>
      <div style={{...S.card, maxWidth:480, textAlign:"left"}}>
        <button style={S.backBtn} onClick={onBack}>← Back</button>
        <h2 style={{...S.title, fontSize:19, marginBottom:4}}>🏆 CHAMPIONSHIP</h2>
        <p style={{...S.subtitle, marginBottom:22}}>Head-to-head records across all games played</p>

        {pairs.length === 0 ? (
          <p style={{color:"#5a6880", fontSize:13, textAlign:"center", padding:"24px 0"}}>
            No games recorded yet. Play some games to build the championship table.
          </p>
        ) : (
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            {pairs.map((pair, i) => {
              const [p1, p2] = pair.players;
              const w1 = pair.wins[p1] || 0;
              const w2 = pair.wins[p2] || 0;
              const draws = pair.draws || 0;
              const total = w1 + w2 + draws;
              const leader = w1 > w2 ? p1 : w2 > w1 ? p2 : null;
              return (
                <div key={i} style={S.champCard}>
                  <div style={S.champHeader}>
                    <span style={{...S.champName, color:P_COLORS[0]}}>{p1}</span>
                    <span style={S.champVs}>vs</span>
                    <span style={{...S.champName, color:P_COLORS[1]}}>{p2}</span>
                    <span style={S.champGames}>{total} game{total!==1?"s":""}</span>
                  </div>
                  <div style={S.champRow}>
                    <div style={S.champStat}>
                      <span style={{...S.champStatNum, color:P_COLORS[0]}}>{w1}</span>
                      <span style={S.champStatLabel}>wins</span>
                    </div>
                    <div style={S.champStat}>
                      <span style={{...S.champStatNum, color:"#5a6880"}}>{draws}</span>
                      <span style={S.champStatLabel}>draws</span>
                    </div>
                    <div style={S.champStat}>
                      <span style={{...S.champStatNum, color:P_COLORS[1]}}>{w2}</span>
                      <span style={S.champStatLabel}>wins</span>
                    </div>
                  </div>
                  {leader && (
                    <div style={S.champLeader}>
                      Leading: <span style={{color: w1>w2?P_COLORS[0]:P_COLORS[1], fontWeight:700}}>{leader}</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {pairs.length > 0 && (
          <button style={{...S.footerBtn, ...S.ghostBtn, marginTop:20, width:"100%", justifyContent:"center"}}
            onClick={() => { if (window.confirm("Clear all championship records?")) onClear(); }}>
            Clear records
          </button>
        )}
      </div>
    </div>
  );
}

// ── Game screen ────────────────────────────────────────────────────────────────
export default function DotsAndBoxes() {
  const [screen, setScreen]         = useState("setup"); // setup | game | championship
  const [config, setConfig]         = useState(null);
  const [edges, setEdges]           = useState(null);
  const [boxes, setBoxes]           = useState(null);
  const [current, setCurrent]       = useState(0);
  const [scores, setScores]         = useState([0, 0]);
  const [gameOver, setGameOver]     = useState(false);
  const [hovered, setHovered]       = useState(null);
  const [aiThinking, setAiThinking] = useState(false);
  const [champ, setChamp]           = useState(() => loadChampionship());
  const boxesRef  = useRef(null);
  const scoresRef = useRef(null);
  const configRef = useRef(null);

  const startGame = (cfg) => {
    const gs = GRID_SIZES[cfg.gridSize].dots;
    boxesRef.current  = initBoxes(gs);
    scoresRef.current = [0, 0];
    configRef.current = { ...cfg, gs };
    setConfig(configRef.current);
    setEdges(initEdges(gs));
    setBoxes(boxesRef.current);
    setCurrent(0);
    setScores([0, 0]);
    setGameOver(false);
    setHovered(null);
    setAiThinking(false);
    setScreen("game");
  };

  const processMove = useCallback((newEdges, pidx) => {
    const gs = configRef.current.gs;
    const nb = boxesRef.current.map(r => [...r]);
    let claimed = 0;
    for (let r = 0; r < gs-1; r++)
      for (let c = 0; c < gs-1; c++)
        if (nb[r][c] === null && checkBox(newEdges, r, c)) { nb[r][c] = pidx; claimed++; }
    const ns = [...scoresRef.current];
    ns[pidx] += claimed;
    boxesRef.current  = nb;
    scoresRef.current = ns;
    setBoxes([...nb]);
    setScores([...ns]);
    const total = ns[0] + ns[1];
    if (total === (gs-1)*(gs-1)) {
      setGameOver(true);
      // Record championship result
      const cfg = configRef.current;
      const n1 = cfg.players[0].name;
      const n2 = cfg.players[1].name;
      const winnerName = ns[0] > ns[1] ? n1 : ns[1] > ns[0] ? n2 : null;
      const updated = recordResult(loadChampionship(), n1, n2, winnerName);
      saveChampionship(updated);
      setChamp(updated);
      return { next: pidx, done: true };
    }
    const next = claimed > 0 ? pidx : 1 - pidx;
    setCurrent(next);
    return { next, done: false };
  }, []);

  const runAI = useCallback((currentEdges, delay) => {
    setTimeout(() => {
      const cfg    = configRef.current;
      const aiMove = getAIMove(currentEdges, boxesRef.current, cfg.gs, cfg.aiLevel);
      if (!aiMove) { setAiThinking(false); return; }
      const ae = cloneEdges(currentEdges);
      if (aiMove.type === "h") ae.h[aiMove.r][aiMove.c] = 1;
      else ae.v[aiMove.r][aiMove.c] = 1;
      setEdges(ae);
      const { next, done } = processMove(ae, 1);
      if (done) { setAiThinking(false); return; }
      if (next === 1) { runAI(ae, 350); }
      else { setAiThinking(false); }
    }, delay);
  }, [processMove]);

  const handleEdge = useCallback((type, r, c) => {
    if (!config || gameOver || aiThinking) return;
    if (config.mode === "hvc" && current === 1) return;
    const arr = type === "h" ? edges.h : edges.v;
    if (arr[r][c] !== null) return;
    const ne = cloneEdges(edges);
    if (type === "h") ne.h[r][c] = current; else ne.v[r][c] = current;
    setEdges(ne);
    const { next, done } = processMove(ne, current);
    if (!done && config.mode === "hvc" && next === 1) {
      setAiThinking(true);
      runAI(ne, 450);
    }
  }, [config, edges, current, gameOver, aiThinking, processMove, runAI]);

  const clearChampionship = () => {
    saveChampionship({});
    setChamp({});
  };

  // ── Screens ──
  if (screen === "championship") return (
    <ChampionshipScreen
      onBack={() => setScreen("setup")}
      onClear={clearChampionship}
    />
  );

  if (screen === "setup") return (
    <SetupScreen
      onStart={startGame}
      onShowChampionship={() => setScreen("championship")}
    />
  );

  // ── Game ──
  const { gs, players, mode, aiLevel } = config;
  const sizeKey = Object.keys(GRID_SIZES).find(k => GRID_SIZES[k].dots === gs);
  const CELL = CELL_SIZES[sizeKey] || 66;
  const DOT = 7, PAD = 28, ET = 5, CZ = 20;
  const svgSz = PAD * 2 + CELL * (gs - 1);

  const winner = gameOver
    ? scores[0] > scores[1] ? 0 : scores[1] > scores[0] ? 1 : -1
    : null;
  const ap = players[current];

  // championship record for these two players
  const champKey   = pairKey(players[0].name, players[1].name);
  const champEntry = champ[champKey];

  return (
    <div style={S.root}>
      <div style={S.gameWrap}>

        {/* Turn banner */}
        <div style={{
          ...S.turnBanner,
          background: gameOver
            ? (winner===-1 ? "#2a3a4a" : players[winner].color)
            : ap.color,
          boxShadow: gameOver
            ? (winner===-1 ? "none" : `0 0 28px ${players[winner].color}44`)
            : `0 0 28px ${ap.color}44`,
        }}>
          {gameOver
            ? winner===-1 ? "It's a draw!" : `${players[winner].name} wins! 🎉`
            : aiThinking ? `${players[1].name} thinking…`
            : `${ap.name}'s turn`}
        </div>

        {/* Score cards */}
        <div style={S.scoreRow}>
          {players.map((p, i) => {
            const isActive = current===i && !gameOver;
            const w = champEntry ? (champEntry.wins[p.name] || 0) : 0;
            return (
              <div key={i} style={{
                ...S.scoreCard,
                borderColor: isActive ? p.color : "#1e2a3a",
                background:  isActive ? p.light : "#0e1420",
                transform:   isActive ? "scale(1.04)" : "scale(1)",
                boxShadow:   isActive ? `0 4px 18px ${p.color}30` : "none",
              }}>
                <div style={{...S.scoreBar, background:p.color, opacity:isActive?1:0.3}} />
                <div style={S.scoreInner}>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={S.scoreName}>{p.name}</div>
                    {mode==="hvc" && i===1 && (
                      <div style={S.aiLevelTag}>{AI_LEVELS[aiLevel]?.label}</div>
                    )}
                    {champEntry && (
                      <div style={S.champWins}>{w} championship win{w!==1?"s":""}</div>
                    )}
                  </div>
                  <div style={{...S.scoreNum, color:p.color}}>{scores[i]}</div>
                </div>
                {isActive && !gameOver && <div style={{...S.activeArrow, color:p.color}}>▶</div>}
              </div>
            );
          })}
        </div>

        {/* SVG grid */}
        <div style={S.svgWrap}>
          <svg width={svgSz} height={svgSz} style={{display:"block", touchAction:"manipulation"}}>

            {boxes.map((row,r) => row.map((owner,c) => owner!==null ? (
              <rect key={`bf-${r}-${c}`}
                x={PAD+c*CELL+ET/2} y={PAD+r*CELL+ET/2}
                width={CELL-ET} height={CELL-ET}
                fill={players[owner].light} rx={3} />
            ) : null))}

            {edges.h.map((row,r) => row.map((owner,c) => {
              const x1=PAD+c*CELL+DOT/2, x2=PAD+(c+1)*CELL-DOT/2, y=PAD+r*CELL;
              const hov = hovered?.type==="h" && hovered.r===r && hovered.c===c;
              const can = owner===null && !gameOver && !(mode==="hvc"&&current===1) && !aiThinking;
              return (
                <g key={`h-${r}-${c}`}>
                  <line x1={x1} y1={y} x2={x2} y2={y}
                    stroke={owner!==null?players[owner].color:hov?ap.color:"#1e2a3a"}
                    strokeWidth={owner!==null?ET:hov?ET-1:2} strokeLinecap="round"
                    style={{transition:"stroke 0.1s,stroke-width 0.1s"}} />
                  {can && <line x1={x1} y1={y} x2={x2} y2={y}
                    stroke="transparent" strokeWidth={CZ} style={{cursor:"pointer"}}
                    onMouseEnter={() => setHovered({type:"h",r,c})}
                    onMouseLeave={() => setHovered(null)}
                    onClick={() => handleEdge("h",r,c)} />}
                </g>
              );
            }))}

            {edges.v.map((row,r) => row.map((owner,c) => {
              const x=PAD+c*CELL, y1=PAD+r*CELL+DOT/2, y2=PAD+(r+1)*CELL-DOT/2;
              const hov = hovered?.type==="v" && hovered.r===r && hovered.c===c;
              const can = owner===null && !gameOver && !(mode==="hvc"&&current===1) && !aiThinking;
              return (
                <g key={`v-${r}-${c}`}>
                  <line x1={x} y1={y1} x2={x} y2={y2}
                    stroke={owner!==null?players[owner].color:hov?ap.color:"#1e2a3a"}
                    strokeWidth={owner!==null?ET:hov?ET-1:2} strokeLinecap="round"
                    style={{transition:"stroke 0.1s,stroke-width 0.1s"}} />
                  {can && <line x1={x} y1={y1} x2={x} y2={y2}
                    stroke="transparent" strokeWidth={CZ} style={{cursor:"pointer"}}
                    onMouseEnter={() => setHovered({type:"v",r,c})}
                    onMouseLeave={() => setHovered(null)}
                    onClick={() => handleEdge("v",r,c)} />}
                </g>
              );
            }))}

            {boxes.map((row,r) => row.map((owner,c) => owner!==null ? (
              <text key={`bi-${r}-${c}`}
                x={PAD+c*CELL+CELL/2} y={PAD+r*CELL+CELL/2+5}
                textAnchor="middle" fill={players[owner].color}
                fontSize={Math.max(9, Math.floor(CELL*0.23))}
                fontFamily="'DM Mono',monospace" fontWeight="700"
                style={{userSelect:"none",pointerEvents:"none"}}>
                {players[owner].initial}
              </text>
            ) : null))}

            {Array.from({length:gs},(_,r) => Array.from({length:gs},(_,c) => (
              <circle key={`d-${r}-${c}`}
                cx={PAD+c*CELL} cy={PAD+r*CELL} r={DOT/2} fill="#c8d0e0" />
            )))}
          </svg>
        </div>

        {/* Footer */}
        <div style={S.footer}>
          <button style={S.footerBtn} onClick={() => startGame(config)}>New Game</button>
          <button style={{...S.footerBtn, ...S.ghostBtn}} onClick={() => setScreen("setup")}>Menu</button>
          <button style={{...S.footerBtn, ...S.ghostBtn}} onClick={() => setScreen("championship")}>🏆</button>
        </div>

      </div>
    </div>
  );
}
